when:
  - event: [push, pull_request]

steps:
  test:
    image: composer:2
    commands:
      - composer install --prefer-dist --no-interaction
      - sh -n scripts/install.sh
      - sh -n scripts/generate-homebrew-formula.sh
      - sh -n scripts/verify-release.sh
      - composer test

  build-phar:
    image: php:8.4-cli-bookworm
    commands:
      - apt-get update
      - apt-get install -y git curl unzip
      - git config --global --add safe.directory "$PWD"
      - curl -fsSL https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      - curl -fsSL -o /usr/local/bin/box https://github.com/box-project/box/releases/download/4.6.6/box.phar
      - chmod +x /usr/local/bin/box
      - php scripts/generate-build-info.php
      - composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
      - box compile --no-parallel
      - php build/dw.phar --version || true
      - php build/dw.phar list

  validate-powershell:
    image: mcr.microsoft.com/powershell:7.4-ubuntu-22.04
    commands:
      - pwsh -NoProfile -Command '$null = [scriptblock]::Create((Get-Content -Raw scripts/install.ps1))'

  sdk-python-parity:
    image: composer:2
    commands:
      - |
        if [ -n "$${CI_NETRC_MACHINE:-}" ] && [ -n "$${CI_NETRC_USERNAME:-}" ] && [ -n "$${CI_NETRC_PASSWORD:-}" ]; then
          cat > "$HOME/.netrc" <<EOF
        machine $${CI_NETRC_MACHINE}
          login $${CI_NETRC_USERNAME}
          password $${CI_NETRC_PASSWORD}
        EOF
          chmod 600 "$HOME/.netrc"
        fi
      - export FORGE_BASE="$${CI_FORGE_URL%/}"
      - rm -rf /tmp/sdk-python
      - git clone --depth 1 "$${FORGE_BASE}/$${CI_REPO_OWNER}/sdk-python.git" /tmp/sdk-python
      - scripts/check-sdk-python-parity.sh /tmp/sdk-python

  public-boundary:
    image: composer:2
    commands:
      - export PUBLIC_BOUNDARY_GIT_RANGE="$${CI_COMMIT_SHA}^..$${CI_COMMIT_SHA}"
      - if [ -n "$${CI_PREV_COMMIT_SHA:-}" ]; then export PUBLIC_BOUNDARY_GIT_RANGE="$${CI_PREV_COMMIT_SHA}..$${CI_COMMIT_SHA}"; fi
      - scripts/check-public-boundary.sh