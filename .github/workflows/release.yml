name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (for manual dispatch, e.g. v0.0.1-test)'
        required: false
        default: ''

permissions:
  contents: write

env:
  SPC_EXTENSIONS: curl,mbstring,openssl,phar,tokenizer,ctype,filter,fileinfo,iconv,sockets
  # Windows: drop ext-openssl. PHP 8.4's Windows openssl extension fails
  # to build against OpenSSL 3.x (references removed ERR_NUM_ERRORS).
  # curl on Windows uses Schannel for TLS, so HTTPS still works without
  # ext-openssl.
  SPC_EXTENSIONS_WINDOWS: curl,mbstring,phar,tokenizer,ctype,filter,fileinfo,iconv,sockets
  PHP_VERSION: '8.4'
  BOX_VERSION: '4.6.6'
  # Passed to every spc step so it can use authenticated GitHub API calls
  # when fetching source tarballs / pre-built libs (avoids 403 rate limits).
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  build-phar:
    name: Build PHAR
    runs-on: ubuntu-latest
    outputs:
      phar-name: durable-workflow.phar
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer:v2, box:${{ env.BOX_VERSION }}
          coverage: none
          ini-values: phar.readonly=0

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Build PHAR
        run: box compile --no-parallel

      - name: Verify PHAR
        run: |
          php build/durable-workflow.phar --version || true
          box info build/durable-workflow.phar

      - uses: actions/upload-artifact@v4
        with:
          name: durable-workflow-phar
          path: build/durable-workflow.phar
          if-no-files-found: error

  build-binary:
    name: Build ${{ matrix.name }}
    needs: build-phar
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            spc_asset: spc-linux-x86_64
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            spc_asset: spc-linux-aarch64
          - name: macos-aarch64
            runner: macos-14
            spc_asset: spc-macos-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Download PHAR artifact
        uses: actions/download-artifact@v4
        with:
          name: durable-workflow-phar
          path: build/

      - name: Download spc
        run: |
          mkdir -p build/.tools
          for attempt in 1 2 3 4 5; do
            if curl -fsSL --retry 3 --retry-all-errors --connect-timeout 10 \
                -o build/.tools/spc \
                "https://dl.static-php.dev/static-php-cli/spc-bin/nightly/${{ matrix.spc_asset }}"; then
              break
            fi
            echo "spc download attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
          test -s build/.tools/spc
          chmod +x build/.tools/spc

      - name: Cache spc downloads
        uses: actions/cache@v4
        with:
          path: |
            build/.tools/downloads
            build/.tools/source
          key: spc-${{ matrix.name }}-php${{ env.PHP_VERSION }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            spc-${{ matrix.name }}-php${{ env.PHP_VERSION }}-

      - name: Fetch PHP sources & extension deps
        working-directory: build/.tools
        run: |
          ./spc doctor --auto-fix || true
          ./spc download --with-php=${{ env.PHP_VERSION }} \
            --for-extensions="$SPC_EXTENSIONS" --prefer-pre-built

      - name: Build phpmicro SAPI with extensions
        working-directory: build/.tools
        run: ./spc build "$SPC_EXTENSIONS" --build-micro

      - name: Combine PHAR into standalone binary
        working-directory: build/.tools
        run: |
          ./spc micro:combine ../../build/durable-workflow.phar \
            --output=../../build/durable-workflow-${{ matrix.name }}

      - name: Smoke test binary (native arch only)
        if: matrix.name == 'linux-x86_64' || matrix.name == 'macos-aarch64'
        run: |
          chmod +x build/durable-workflow-${{ matrix.name }}
          ./build/durable-workflow-${{ matrix.name }} --version || true
          ./build/durable-workflow-${{ matrix.name }} list || true

      - uses: actions/upload-artifact@v4
        with:
          name: durable-workflow-${{ matrix.name }}
          path: build/durable-workflow-${{ matrix.name }}
          if-no-files-found: error

  build-binary-windows:
    name: Build windows-x86_64
    needs: build-phar
    runs-on: windows-latest
    # Windows builds currently fail at the ext-openssl compile step:
    # PHP 8.4's Windows openssl extension references ERR_NUM_ERRORS,
    # which was removed in OpenSSL 3.x. spc adds ext-openssl as a
    # transitive dep of curl even though curl-on-Windows uses Schannel.
    # Until there is an upstream fix (or an spc option to suppress the
    # transitive dep), this job is allowed to fail without blocking the
    # release of the PHAR and Linux/macOS binaries.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download PHAR artifact
        uses: actions/download-artifact@v4
        with:
          name: durable-workflow-phar
          path: build/

      - name: Download spc.exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\.tools | Out-Null
          $url = "https://dl.static-php.dev/static-php-cli/spc-bin/nightly/spc-windows-x64.exe"
          for ($i = 1; $i -le 5; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile "build\.tools\spc.exe" -TimeoutSec 120
              break
            } catch {
              Write-Host "spc.exe download attempt $i failed: $_"
              if ($i -eq 5) { throw }
              Start-Sleep -Seconds 10
            }
          }

      - name: Cache spc downloads
        uses: actions/cache@v4
        with:
          path: |
            build/.tools/downloads
            build/.tools/source
          key: spc-windows-x86_64-php${{ env.PHP_VERSION }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            spc-windows-x86_64-php${{ env.PHP_VERSION }}-

      - name: Fetch PHP sources & extension deps
        shell: pwsh
        working-directory: build/.tools
        run: |
          .\spc.exe doctor --auto-fix
          .\spc.exe download --with-php=${{ env.PHP_VERSION }} `
            --for-extensions="$env:SPC_EXTENSIONS_WINDOWS" --prefer-pre-built

      - name: Build phpmicro SAPI with extensions
        shell: pwsh
        working-directory: build/.tools
        run: .\spc.exe build "$env:SPC_EXTENSIONS_WINDOWS" --build-micro --debug

      - name: Upload spc build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-spc-logs
          path: build/.tools/log/
          if-no-files-found: warn

      - name: Combine PHAR into standalone binary
        shell: pwsh
        working-directory: build/.tools
        run: |
          .\spc.exe micro:combine ..\..\build\durable-workflow.phar `
            --output=..\..\build\durable-workflow-windows-x86_64.exe

      - name: Smoke test binary
        shell: pwsh
        run: |
          .\build\durable-workflow-windows-x86_64.exe --version
          .\build\durable-workflow-windows-x86_64.exe list

      - uses: actions/upload-artifact@v4
        with:
          name: durable-workflow-windows-x86_64
          path: build/durable-workflow-windows-x86_64.exe
          if-no-files-found: error

  release:
    name: Publish Release
    # Windows is intentionally not a hard dependency: it runs with
    # continue-on-error so a Windows-build failure doesn't block the
    # Linux/macOS release. If the Windows job succeeds, its artifact
    # is picked up by download-artifact below.
    needs: [build-phar, build-binary]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
