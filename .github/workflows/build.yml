name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (PHP ${{ matrix.php }})
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
      - run: composer install --prefer-dist --no-interaction
      - name: Validate installer scripts
        run: |
          sh -n scripts/install.sh
          sh -n scripts/generate-homebrew-formula.sh
          sh -n scripts/verify-release.sh
          sh -n scripts/ci/check-docs-release-audit.sh
          node --check scripts/ci/release-version.js
          bash -n scripts/ci/verify-release-tag-source.sh
          bash -n scripts/verify-public-release-assets.sh
          bash -n scripts/verify-reproducible-build.sh
          pwsh -NoProfile -Command '$null = [scriptblock]::Create((Get-Content -Raw scripts/install.ps1))'
      - name: Verify release recovery source contracts
        run: |
          python scripts/ci/test-component-release-recovery.py
          python scripts/ci/test-cli-publication-run.py
          python scripts/ci/test-publish-planned-tag.py
      - run: composer test

  build-phar:
    name: Build PHAR (smoke test)
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2
        with:
          php-version: '8.4'
          tools: composer:v2, box:4.6.6
          coverage: none
          ini-values: phar.readonly=0
      - run: php scripts/generate-build-info.php
      - run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader
      - run: box compile --no-parallel
      - run: box info build/dw.phar
      - run: php build/dw.phar list

  reproducible-build:
    name: Reproducible build (PHAR is bit-identical across rebuilds)
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2
        with:
          php-version: '8.4'
          tools: composer:v2, box:4.6.6
          coverage: none
          ini-values: phar.readonly=0
      - name: Verify dw.phar reproduces bit-for-bit
        run: scripts/verify-reproducible-build.sh

  sdk-python-parity:
    name: SDK-Python parity fixtures
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          path: cli
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          repository: durable-workflow/sdk-python
          path: sdk-python
      - name: Compare shared control-plane parity fixtures
        working-directory: cli
        run: scripts/check-sdk-python-parity.sh ../sdk-python

  target-branch-qualification:
    name: Target branch qualification
    if: ${{ always() && github.server_url == 'https://github.com' }}
    needs: [test, build-phar, reproducible-build, sdk-python-parity]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every build cell
        env:
          TEST_RESULT: ${{ needs.test.result }}
          PHAR_RESULT: ${{ needs.build-phar.result }}
          REPRODUCIBLE_RESULT: ${{ needs.reproducible-build.result }}
          PARITY_RESULT: ${{ needs.sdk-python-parity.result }}
        run: |
          test "$TEST_RESULT" = success
          test "$PHAR_RESULT" = success
          test "$REPRODUCIBLE_RESULT" = success
          test "$PARITY_RESULT" = success
